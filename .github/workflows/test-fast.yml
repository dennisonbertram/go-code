name: test-fast

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run fast test suite
        run: go test ./internal/... ./cmd/...

      - name: Run Terminal-Bench artifact smoke tests
        run: python3 scripts/test_terminal_bench_artifacts.py
