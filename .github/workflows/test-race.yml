name: test-race

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    # Race builds are slow; this job is scoped to the concurrency-critical
    # packages (see Makefile's RACE_PKGS) rather than the full ./... tree, so
    # 25 minutes gives comfortable headroom without letting a hang run away.
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run race-enabled test suite
        run: make test-race
