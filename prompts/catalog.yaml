version: 1
defaults:
  # Empty = base prompt only (no intent overlay). Overlays are opt-in and
  # selected explicitly per run (RunRequest.AgentIntent) or by a launcher
  # (HARNESS_DEFAULT_AGENT_INTENT).
  intent: ""
  model_profile: default
intents:
  # Headless/autonomous overlay for the benchmark harness, cloud, and cron.
  autonomous: intents/autonomous.md
  # Back-compat alias: older callers may still name "general".
  general: intents/autonomous.md
  code_review: intents/code_review.md
  frontend_design: intents/frontend_design.md
model_profiles:
  - name: deepseek
    match: deepseek-*
    file: models/deepseek.md
  - name: openai_gpt5
    match: gpt-5-*
    file: models/openai_gpt5.md
  - name: autoresearch
    match: autoresearch-*
    file: models/autoresearch.md
  - name: default
    match: "*"
    file: models/default.md
extensions:
  behaviors_dir: extensions/behaviors
  talents_dir: extensions/talents
